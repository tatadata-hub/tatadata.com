<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Daftar | TATA-DATA</title>

    <link rel="stylesheet" href="css/auth.css">

</head>

<body>

<div class="login-wrapper">

    <!-- LEFT -->
    <div class="login-left">

        <div class="left-content">

            <h1>TATA-DATA</h1>

            <p>
                Belajar Microsoft Excel
                dengan Animasi Interaktif.
            </p>

            <img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=1200">

        </div>

    </div>

    <!-- RIGHT -->
    <div class="login-right">

        <div class="login-box">

            <h2>Buat Akun Aja Yuk! 🚀</h2>

            <p>

                Daftar gratis dan mulai belajar sekarang.

            </p>

            <form id="registerForm">

                <div class="input-group">

                    <label>Nama Lengkap</label>

                    <input
                    type="text"
                    id="nama"
                    placeholder="Masukkan nama lengkap"
                    required>

                </div>

                <div class="input-group">

                    <label>Email</label>

                    <input
                    type="email"
                    id="email"
                    placeholder="email@gmail.com"
                    required>

                </div>

                <div class="input-group">

                    <label>No WhatsApp</label>

                    <input
                    type="tel"
                    id="wa"
                    placeholder="08xxxxxxxxxx"
                    required>

                </div>

                <div class="input-group">

                    <label>Password</label>

                    <div class="password-box">

                        <input
                        type="password"
                        id="password"
                        placeholder="Minimal 6 karakter"
                        required>

                        <button
                        type="button"
                        class="togglePassword">

                            👁

                        </button>

                    </div>

                </div>

                <div class="input-group">

                    <label>Konfirmasi Password</label>

                    <div class="password-box">

                        <input
                        type="password"
                        id="confirmPassword"
                        placeholder="Ulangi Password"
                        required>

                        <button
                        type="button"
                        class="togglePassword">

                            👁

                        </button>

                    </div>

                </div>

                <div class="login-option">

                    <label>

                        <input type="checkbox" required>

                        Saya menyetujui Syarat & Ketentuan

                    </label>

                </div>

                <button
                class="login-btn"
                type="submit">

                    DAFTAR

                </button>

            </form>

            <div class="register-link">

                Sudah punya akun?

                <a href="login.html">

                    Login

                </a>

            </div>

        </div>

    </div>

</div>

<script>

document.querySelectorAll(".togglePassword").forEach(function(btn){

    btn.addEventListener("click",function(){

        const input=this.previousElementSibling;

        if(input.type==="password"){

            input.type="text";

            this.innerHTML="🙈";

        }else{

            input.type="password";

            this.innerHTML="👁";

        }

    });

});

document
.getElementById("registerForm")
.addEventListener("submit",function(e){

e.preventDefault();

const password=document.getElementById("password").value;

const confirm=document.getElementById("confirmPassword").value;

if(password!==confirm){

alert("Password tidak sama!");

return;

}

alert("Register berhasil!\n\n(Mohon ditunggu ..... 🚀)");

});

</script>
<script src="js/api.js"></script>
<script src="js/register.js"></script>
</body>

</html>
